services:
  cloud-app:
    build: .
    restart: unless-stopped
    ports:
      # Host port is configurable so the Pi can use 3002 (Homepage owns 3000
      # there) without editing this file: set HOST_PORT=3002 in .env.
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - PORT=3000
